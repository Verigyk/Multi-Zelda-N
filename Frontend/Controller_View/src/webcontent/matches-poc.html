<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoC Parties Multiples</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --panel-2: #1f2937;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #22d3ee;
            --ok: #22c55e;
            --warn: #f59e0b;
            --danger: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(160deg, #020617, #0f172a 45%, #111827);
            color: var(--text);
        }

        .layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 16px;
        }

        .panel {
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }

        h1, h2, h3 { margin: 0 0 12px; }
        h1 { font-size: 1.5rem; color: var(--accent); }
        h2 { font-size: 1.1rem; }

        .create-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input, button {
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            padding: 10px;
            font-size: 0.95rem;
        }

        input { flex: 1; }
        input[type="number"] { max-width: 120px; }

        button {
            cursor: pointer;
            transition: 0.15s ease;
        }

        button:hover { filter: brightness(1.15); }

        .btn-primary { background: #0369a1; }
        .btn-ok { background: #166534; }
        .btn-warn { background: #92400e; }
        .btn-danger { background: #7f1d1d; }

        .list {
            display: grid;
            gap: 8px;
            max-height: 320px;
            overflow: auto;
        }

        .match-card {
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #0b1220;
            padding: 10px;
        }

        .match-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent) inset;
        }

        .match-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
        }

        .small { color: var(--muted); font-size: 0.85rem; }

        .actions {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .status-loading { color: var(--warn); }
        .status-running { color: var(--ok); }
        .status-finished { color: #fda4af; }

        .screen {
            min-height: 240px;
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 16px;
            display: grid;
            place-items: center;
            text-align: center;
            background: #020617;
        }

        .loading-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--warn);
            display: inline-block;
            margin: 0 3px;
            animation: pulse 1.1s infinite ease-in-out;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        #statusMsg {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <section class="panel">
            <h1>PoC Fonctionnalité 4</h1>
            <p class="small">Parties simultanées + loading + fin + historique (autonome, non intégré au reste).</p>

            <div class="create-row">
                <input id="titleInput" placeholder="Nom de la partie (optionnel)" />
                <input id="maxPlayersInput" type="number" min="2" max="16" value="4" />
                <button class="btn-primary" id="createBtn">Créer</button>
            </div>

            <h2>Parties Actives</h2>
            <div id="activeList" class="list"></div>

            <h2 style="margin-top:16px;">Historique</h2>
            <div id="historyList" class="list"></div>
        </section>

        <section class="panel">
            <h2>Écran de Simulation</h2>
            <div id="screen" class="screen">
                <div>
                    <h3>Aucune partie sélectionnée</h3>
                    <p class="small">Clique sur une partie active ou historique.</p>
                </div>
            </div>
            <div id="statusMsg">API: <code>http://localhost:8080/matches</code></div>
        </section>
    </div>

    <script>
        const API = "http://localhost:8080/matches";
        const state = {
            active: [],
            history: [],
            selectedId: null
        };

        async function api(path, options = {}) {
            const response = await fetch(API + path, {
                headers: { "Content-Type": "application/json" },
                ...options
            });
            if (!response.ok) {
                throw new Error("HTTP " + response.status);
            }
            if (response.status === 204) return null;
            return response.json();
        }

        function formatDate(value) {
            if (!value) return "-";
            return new Date(value).toLocaleString();
        }

        function matchClass(status) {
            if (status === "LOADING") return "status-loading";
            if (status === "RUNNING") return "status-running";
            if (status === "FINISHED") return "status-finished";
            return "";
        }

        function selectedMatch() {
            return state.active.find(m => m.id === state.selectedId)
                || state.history.find(m => m.id === state.selectedId)
                || null;
        }

        function renderScreen() {
            const screen = document.getElementById("screen");
            const match = selectedMatch();
            if (!match) {
                screen.innerHTML = `
                    <div>
                        <h3>Aucune partie sélectionnée</h3>
                        <p class="small">Clique sur une partie active ou historique.</p>
                    </div>`;
                return;
            }

            if (match.state === "LOADING") {
                screen.innerHTML = `
                    <div>
                        <h3>Chargement de ${match.title}</h3>
                        <p class="small">Partie ${match.id} • ${match.playersCount}/${match.maxPlayers} joueurs</p>
                        <div style="margin-top:12px;">
                            <span class="loading-dot"></span>
                            <span class="loading-dot"></span>
                            <span class="loading-dot"></span>
                        </div>
                    </div>`;
                return;
            }

            if (match.state === "RUNNING") {
                screen.innerHTML = `
                    <div>
                        <h3>Partie en cours</h3>
                        <p>${match.title}</p>
                        <p class="small">Démarrée à: ${formatDate(match.startedAt)}</p>
                    </div>`;
                return;
            }

            screen.innerHTML = `
                <div>
                    <h3>Écran de fin</h3>
                    <p>Partie: ${match.title}</p>
                    <p>Vainqueur: <strong>${match.winner || "Inconnu"}</strong></p>
                    <p class="small">Terminée à: ${formatDate(match.endedAt)}</p>
                </div>`;
        }

        function renderList(containerId, matches, withActions) {
            const container = document.getElementById(containerId);
            if (matches.length === 0) {
                container.innerHTML = `<div class="small">Aucune donnée.</div>`;
                return;
            }

            container.innerHTML = matches.map(match => `
                <div class="match-card ${state.selectedId === match.id ? "selected" : ""}" data-id="${match.id}">
                    <div class="match-head">
                        <strong>${match.title}</strong>
                        <span class="${matchClass(match.state)}">${match.state}</span>
                    </div>
                    <div class="small">ID: ${match.id}</div>
                    <div class="small">Joueurs: ${match.playersCount}/${match.maxPlayers}</div>
                    <div class="small">Créée: ${formatDate(match.createdAt)}</div>
                    ${match.startedAt ? `<div class="small">Start: ${formatDate(match.startedAt)}</div>` : ""}
                    ${match.endedAt ? `<div class="small">End: ${formatDate(match.endedAt)}</div>` : ""}
                    ${match.winner ? `<div class="small">Winner: ${match.winner}</div>` : ""}
                    ${withActions ? `
                        <div class="actions">
                            <button class="btn-ok" data-action="join" data-id="${match.id}">Join</button>
                            <button class="btn-warn" data-action="start" data-id="${match.id}">Start</button>
                            <button class="btn-danger" data-action="finish" data-id="${match.id}">Finish</button>
                        </div>
                    ` : ""}
                </div>
            `).join("");

            container.querySelectorAll(".match-card").forEach(card => {
                card.addEventListener("click", (e) => {
                    if (e.target.closest("button")) return;
                    state.selectedId = card.dataset.id;
                    renderAll();
                });
            });

            if (withActions) {
                container.querySelectorAll("button[data-action]").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        handleAction(btn.dataset.action, btn.dataset.id);
                    });
                });
            }
        }

        function renderAll() {
            renderList("activeList", state.active, true);
            renderList("historyList", state.history, false);
            renderScreen();
        }

        async function refreshData() {
            try {
                const [active, history] = await Promise.all([
                    api("/active"),
                    api("/history")
                ]);
                state.active = active;
                state.history = history;

                const exists = selectedMatch();
                if (!exists && state.active.length > 0) {
                    state.selectedId = state.active[0].id;
                }
                renderAll();
            } catch (error) {
                document.getElementById("statusMsg").textContent =
                    "Erreur API: " + error.message + " (backend démarré ?)";
            }
        }

        async function createMatch() {
            const title = document.getElementById("titleInput").value;
            const maxPlayers = Number(document.getElementById("maxPlayersInput").value);
            await api("/create", {
                method: "POST",
                body: JSON.stringify({ title, maxPlayers })
            });
            document.getElementById("titleInput").value = "";
            await refreshData();
        }

        async function handleAction(action, id) {
            try {
                if (action === "join") {
                    await api("/" + id + "/join", { method: "POST" });
                } else if (action === "start") {
                    await api("/" + id + "/start", { method: "POST" });
                } else if (action === "finish") {
                    const winner = prompt("Nom du vainqueur (optionnel):", "");
                    await api("/" + id + "/finish", {
                        method: "POST",
                        body: JSON.stringify({ winner: winner || "" })
                    });
                    state.selectedId = id;
                }
                await refreshData();
            } catch (error) {
                document.getElementById("statusMsg").textContent =
                    "Action impossible: " + error.message;
            }
        }

        document.getElementById("createBtn").addEventListener("click", createMatch);
        refreshData();
        setInterval(refreshData, 2000);
    </script>
</body>
</html>
