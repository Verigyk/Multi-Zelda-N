<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>A Moving Square</title>
    <link rel="stylesheet" href="../css/movingSquare.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    
</head>

<body>
  <div id="gameHud">
    <div>
      <strong id="matchState">Waiting for players</strong>
      <span id="readyState">Not ready</span>
      <span class="hud-separator">|</span>
      <span>Time: <strong id="timer">3:00</strong></span>
      <span class="hud-separator">|</span>
      <span>Gems: <strong id="gemCount">0</strong></span>
      <span id="winner"></span>
    </div>
    <div class="hud-actions">
      <button id="readyBtn">Ready</button>
      <button id="quitBtn">Quit</button>
    </div>
  </div>

  <div id="game">
    <div class="obstacle obstacle-a"></div>
    <div class="obstacle obstacle-b"></div>
    <div id="bombSpawnLayer"></div>
    <div id="gemLayer"></div>
    <div id="projectileLayer"></div>
  </div>
  
  <script src="../js/movingSquare.js"></script>
</body>
</html>
