<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>A Moving Square</title>
    <link rel="stylesheet" href="../css/movingSquare.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    
</head>

<body>
  <div id="gameHud">
    <div>
      <strong id="matchState">Waiting for players</strong>
      <span id="readyState">Not ready</span>
      <span class="hud-separator">|</span>
      <span>Time: <strong id="timer">3:00</strong></span>
      <span class="hud-separator">|</span>
      <span>Gems: <strong id="gemCount">0</strong></span>
      <span id="winner"></span>
    </div>
    <div class="hud-actions">
      <button id="readyBtn">Ready</button>
      <button id="quitBtn">Quit</button>
    </div>
  </div>
  <div id="notification" style="display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:12px 18px;background:rgba(15,23,42,0.95);color:#fff;border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,0.25);z-index:1000;"></div>

  <div id="gameArea">
    <div id="game">
      <div id="obstacleLayer"></div>
      <div id="bombSpawnLayer"></div>
      <div id="gemLayer"></div>
      <div id="projectileLayer"></div>
    </div>
    <aside id="scoreboard">
      <div class="scoreboard-header">
        <strong>Scoreboard</strong>
        <span id="scoreboardSubtitle">Gems par joueur</span>
      </div>
      <ul id="scoreList"></ul>
    </aside>
  </div>
  
  <script src="../js/movingSquare.js"></script>
</body>
</html>
