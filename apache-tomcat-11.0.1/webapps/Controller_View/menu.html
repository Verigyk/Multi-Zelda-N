<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Zelda Multijoueur</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0d1a;
            color: #e0e0ff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #1a1a2e;
            border: 2px solid #4444aa;
            border-radius: 12px;
            padding: 40px;
            width: 360px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            color: #aaaaff;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #8888aa;
            margin-bottom: 28px;
            font-size: 0.9rem;
        }

        /* Onglets */
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid #4444aa;
        }

        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            background: none;
            border: none;
            color: #8888aa;
            font-size: 1rem;
        }

        .tab.active {
            color: #aaaaff;
            border-bottom: 3px solid #aaaaff;
            margin-bottom: -2px;
            font-weight: bold;
        }

        /* Formulaire */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            background: #0d0d1a;
            border: 1px solid #4444aa;
            border-radius: 6px;
            color: #e0e0ff;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #aaaaff;
        }

        button.submit {
            width: 100%;
            padding: 12px;
            background: #4444aa;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 4px;
        }

        button.submit:hover {
            background: #6666cc;
        }

        /* Message retour */
        #message {
            margin-top: 18px;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
        }

        #message.success {
            background: #1a3a1a;
            color: #66ff66;
            border: 1px solid #44aa44;
        }

        #message.error {
            background: #3a1a1a;
            color: #ff6666;
            border: 1px solid #aa4444;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⚔ Zelda Multi</h1>
    <p class="subtitle">Jeu multijoueur en ligne</p>

    <div class="tabs">
        <button class="tab active" onclick="showTab('login')">Se connecter</button>
        <button class="tab" onclick="showTab('register')">Créer un compte</button>
    </div>

    <!-- Formulaire connexion -->
    <div id="form-login">
        <input type="text" id="login-pseudo" placeholder="Pseudo" />
        <input type="password" id="login-password" placeholder="Mot de passe" />
        <button class="submit" onclick="login()">Se connecter</button>
    </div>

    <!-- Formulaire inscription -->
    <div id="form-register" style="display:none">
        <input type="text" id="register-pseudo" placeholder="Choisir un pseudo" />
        <input type="password" id="register-password" placeholder="Choisir un mot de passe" />
        <button class="submit" onclick="register()">Créer le compte</button>
    </div>

    <div id="message"></div>
</div>

<script>
    const BASE_URL = "http://localhost:8080/facade/accounts";

    function showTab(tab) {
        document.getElementById("form-login").style.display   = tab === "login"    ? "block" : "none";
        document.getElementById("form-register").style.display = tab === "register" ? "block" : "none";
        document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
        event.target.classList.add("active");
        hideMessage();
    }

    function showMessage(text, type) {
        const el = document.getElementById("message");
        el.textContent = text;
        el.className = type;  // "success" ou "error"
        el.style.display = "block";
    }

    function hideMessage() {
        document.getElementById("message").style.display = "none";
    }

    async function login() {
        const pseudo   = document.getElementById("login-pseudo").value.trim();
        const password = document.getElementById("login-password").value;

        if (!pseudo || !password) {
            showMessage("Remplis tous les champs.", "error");
            return;
        }

        try {
            const response = await fetch(BASE_URL + "/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pseudo, password })
            });

            const text = await response.text();

            if (response.ok) {
                showMessage("Bienvenue, " + pseudo + " ! Redirection...", "success");
                // Redirige vers le jeu dans 1.5 secondes
                setTimeout(() => {
                    window.location.href = "game.html?pseudo=" + encodeURIComponent(pseudo);
                }, 1500);
            } else {
                showMessage(text, "error");
            }
        } catch (e) {
            showMessage("Impossible de contacter le serveur.", "error");
        }
    }

    async function register() {
        const pseudo   = document.getElementById("register-pseudo").value.trim();
        const password = document.getElementById("register-password").value;

        if (!pseudo || !password) {
            showMessage("Remplis tous les champs.", "error");
            return;
        }

        if (pseudo.length < 3) {
            showMessage("Le pseudo doit faire au moins 3 caractères.", "error");
            return;
        }

        try {
            const response = await fetch(BASE_URL + "/addAccount", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pseudo, password })
            });

            const text = await response.text();

            if (response.ok) {
                showMessage("Compte créé ! Tu peux maintenant te connecter.", "success");
                setTimeout(() => showTab_name("login"), 1500);
            } else {
                showMessage(text, "error");
            }
        } catch (e) {
            showMessage("Impossible de contacter le serveur.", "error");
        }
    }

    function showTab_name(tab) {
        document.getElementById("form-login").style.display    = tab === "login"    ? "block" : "none";
        document.getElementById("form-register").style.display = tab === "register" ? "block" : "none";
        document.querySelectorAll(".tab").forEach((btn, i) => {
            btn.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "register"));
        });
        hideMessage();
    }

    // Connexion avec la touche Entrée
    document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        if (document.getElementById("form-login").style.display !== "none") login();
        else register();
    });
</script>

</body>
</html>
